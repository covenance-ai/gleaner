name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/430011644943/locations/global/workloadIdentityPools/github/providers/github-actions
          service_account: github-deploy@covenance-469421.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gleaner \
            --source=./server \
            --project=covenance-469421 \
            --region=europe-west1 \
            --allow-unauthenticated \
            --memory=256Mi \
            --min-instances=0 \
            --max-instances=3
