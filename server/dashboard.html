<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gleaner</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>/* {STYLES} */
</style>
</head>
<body>

<!-- Auth -->
<div id="auth-overlay">
  <div class="auth-box">
    <h1>Gleaner</h1>
    <p>Sign in to view session data.</p>
    <div id="google-signin-btn" style="display:flex;justify-content:center;min-height:44px"></div>
    <div id="auth-divider" style="font-size:13px;color:var(--text2);margin:16px 0;display:none">or use an API token</div>
    <input type="password" id="token-input" placeholder="gl_...">
    <br><button onclick="authenticate()">Sign in with token</button>
    <div class="error" id="auth-error"></div>
  </div>
</div>

<!-- Onboarding wizard -->
<div id="onboard-overlay">
  <div class="onboard-box">
    <div class="onboard-progress" id="ob-progress"></div>
    <div id="ob-content"></div>
  </div>
</div>

<!-- App -->
<header>
  <div style="display:flex;align-items:center">
    <h1>Gleaner</h1>
    <span class="subtitle">Claude Code session transcripts</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <img id="user-avatar" style="width:28px;height:28px;border-radius:50%;display:none" referrerpolicy="no-referrer" />
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle light/dark mode">&#9788;</button>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</header>

<nav>
  <button class="active" data-tab="home">Home</button>
  <button data-tab="team">Team</button>
  <button data-tab="sessions">Sessions</button>
  <button data-tab="settings">Settings</button>
</nav>

<main>
  <!-- Home tab (personal) -->
  <div class="tab active" id="tab-home">
    <div class="loading" id="home-loading">Loading your data...</div>
    <div id="home-content" style="display:none"></div>
  </div>

  <!-- Team tab -->
  <div class="tab" id="tab-team">
    <div class="loading" id="stats-loading">Loading stats...</div>
    <div id="stats-content" style="display:none">
      <div class="stats-grid" id="stats-grid"></div>
      <h3 style="font-size:14px;color:var(--text2);margin-bottom:12px">Team Members</h3>
      <div id="user-cards"></div>
    </div>
  </div>

  <!-- Sessions tab -->
  <div class="tab" id="tab-sessions">
    <div class="filters" id="session-filters">
      <input type="text" id="filter-user" placeholder="Filter by user...">
      <input type="text" id="filter-project" placeholder="Filter by project...">
      <input type="date" id="filter-date" title="Filter by date">
      <select id="filter-limit">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="500">500</option>
      </select>
      <button onclick="loadSessions()" style="padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">Load</button>
    </div>
    <div id="active-filters"></div>
    <div id="sessions-content">
      <div class="loading">Loading sessions...</div>
    </div>
  </div>

  <!-- Settings tab -->
  <div class="tab" id="tab-settings">
    <div id="settings-profile"></div>
    <div class="settings-section">
      <h3>API Tokens</h3>
      <button class="btn-s" onclick="toggleNewTokenForm()" id="new-token-toggle-btn" style="margin-bottom:12px;font-size:13px">+ New Token</button>
      <div class="new-token-form" id="new-token-form">
        <div style="display:flex;align-items:center;gap:8px">
          <input type="text" id="new-token-name" placeholder="Token name (e.g. laptop, ci)">
          <button class="btn-p" onclick="createSettingsToken()" style="padding:8px 16px">Create</button>
          <button class="btn-s" onclick="toggleNewTokenForm()" style="padding:8px 16px">Cancel</button>
        </div>
        <div id="new-token-result"></div>
      </div>
      <div id="token-list"><div class="loading">Loading tokens...</div></div>
    </div>
    <div class="settings-section">
      <h3>Setup Instructions</h3>
      <div id="setup-instructions"></div>
    </div>
  </div>

  <!-- Session detail -->
  <div id="detail-view">
    <button class="back-btn" onclick="hideDetail()">&larr; Back to sessions</button>
    <div class="detail-header">
      <h2 id="detail-title"></h2>
      <div class="detail-meta" id="detail-meta"></div>
    </div>
    <div class="detail-actions">
      <button onclick="downloadRaw()" id="download-btn">Download raw JSONL</button>
    </div>
    <div class="panel" style="margin-bottom:16px">
      <h3>Tools Used</h3>
      <div class="bar-chart" id="detail-tools"></div>
    </div>
    <div class="panel">
      <h3>Transcript</h3>
      <div class="transcript-search">
        <input type="text" id="transcript-search" placeholder="Search in transcript..." oninput="searchTranscript()">
        <span class="match-count" id="match-count"></span>
      </div>
      <div id="detail-transcript" class="transcript"></div>
    </div>
  </div>
</main>

<script>/* {SCRIPT} */</script>
</body>
</html>
